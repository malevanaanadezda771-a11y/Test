<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Прятки в доме</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; /* Prevent scrolling on mobile */
        }
        h1 { margin: 10px 0; font-size: 24px; text-align: center; }
        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            max-width: 100vw;
        }
        canvas {
            background-color: #eee;
            display: block;
            max-width: 100vw;
            height: auto;
            max-height: 80vh;
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #message {
            font-size: 28px;
            font-weight: bold;
            color: #ff3333;
            text-shadow: 2px 2px 4px #000;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 10px;
            display: none;
            text-align: center;
        }
        #timer {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            font-weight: bold;
            color: black;
            text-shadow: 1px 1px 2px white;
        }
        #info {
            position: absolute;
            top: 40px;
            left: 10px;
            font-size: 14px;
            color: black;
            text-shadow: 1px 1px 2px white;
            background: rgba(255,255,255,0.7);
            padding: 5px;
            border-radius: 5px;
            max-width: 300px;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            pointer-events: auto;
            background: #fff;
            border: 2px solid #333;
            border-radius: 5px;
        }
        
        /* Mobile Controls */
        #mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
        }
        .dpad {
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
        }
        .dpad-row {
            display: flex;
        }
        .mob-btn {
            width: 50px;
            height: 50px;
            margin: 3px;
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid #555;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            touch-action: none;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .mob-btn:active { background: rgba(200, 200, 200, 0.9); }
        .action-btn {
            width: 70px;
            height: 70px;
            background: rgba(100, 150, 255, 0.7);
            border: 2px solid #55a;
            border-radius: 50%;
            font-size: 12px;
            color: white;
            font-weight: bold;
            text-align: center;
            line-height: 70px;
            touch-action: none;
            user-select: none;
            pointer-events: auto;
            cursor: pointer;
            margin-bottom: 5px;
        }
        .action-btn:active { background: rgba(50, 100, 255, 0.9); }
        
        @media (min-width: 900px) {
            #mobile-controls { display: none; }
        }
    </style>
</head>
<body>
    <h1>Прятки: Спрячься в доме!</h1>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-layer">
            <div id="timer">Ожидание...</div>
            <div id="info">Управление: WASD / Стрелки. SPACE - спрятаться.</div>
            <div id="message"></div>
            <button id="restartBtn" style="display:none;" onclick="initGame()">Играть снова</button>
        </div>
        
        <div id="mobile-controls">
            <div class="dpad">
                <div class="mob-btn" id="btn-up">↑</div>
                <div class="dpad-row">
                    <div class="mob-btn" id="btn-left">←</div>
                    <div class="mob-btn" id="btn-down">↓</div>
                    <div class="mob-btn" id="btn-right">→</div>
                </div>
            </div>
            <div class="action-btn" id="btn-hide">Спрятаться</div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
